<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; text-align: center; }
    h1 { color: #c00; }
    .error { color: #666; }
    a { color: #0f766e; }
  </style>
</head>
<body>
  <h1>Payment Failed</h1>
  {% if error %}<p class="error">{{ error }}</p>{% else %}<p class="error">Verification failed or payment was cancelled.</p>{% endif %}
  <p><a href="/api/fraud/payment-review/">Try again</a> · <a href="{{ dashboard_url|default:'http://localhost:5173' }}">Back to Dashboard</a></p>
</body>
</html>
