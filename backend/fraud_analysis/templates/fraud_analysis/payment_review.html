<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Review – Fraud Detection</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 500; }
    input, select { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border: 1px solid #ccc; border-radius: 4px; }
    .error { color: #c00; margin-bottom: 0.5rem; }
    button { margin-top: 1rem; padding: 0.6rem 1.2rem; background: #0f766e; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #0d9488; }
    a { color: #0f766e; }
  </style>
</head>
<body>
  <h1>Payment Review</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="">
    {% csrf_token %}
    <label for="amount">Amount (INR)</label>
    <input type="number" id="amount" name="amount" step="0.01" min="1" required placeholder="e.g. 500">
    <label for="device">Device</label>
    <input type="text" id="device" name="device" placeholder="e.g. Chrome on Windows" value="Desktop">
    <label for="location">Location</label>
    <input type="text" id="location" name="location" placeholder="e.g. Mumbai" value="India">
    <button type="submit">Proceed to Pay (Razorpay)</button>
  </form>
  <p style="margin-top: 1rem;"><a href="{{ dashboard_url|default:'http://localhost:5173' }}">Back to Dashboard</a></p>
</body>
</html>
